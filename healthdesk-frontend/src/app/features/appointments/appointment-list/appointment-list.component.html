<!-- src/app/features/appointments/appointment-list/appointment-list.component.html -->
<div class="page-container">
  <div class="page-header">
    <h1>My Appointments</h1>
    <button mat-raised-button color="primary" routerLink="/appointments/new">
      <mat-icon>add</mat-icon> Book New
    </button>
  </div>

  <app-spinner [show]="isLoading"></app-spinner>

  <mat-card *ngIf="!isLoading">
    <mat-card-content>
      <div *ngIf="appointments.length === 0" class="empty-state">
        <mat-icon>event_busy</mat-icon>
        <p>No appointments found.</p>
        <button mat-stroked-button color="primary" routerLink="/appointments/new">
          Book your first appointment
        </button>
      </div>

      <mat-table [dataSource]="appointments" *ngIf="appointments.length > 0" class="full-table">

        <ng-container matColumnDef="date">
          <mat-header-cell *matHeaderCellDef>Date</mat-header-cell>
          <mat-cell *matCellDef="let row">{{ row.date }}</mat-cell>
        </ng-container>

        <ng-container matColumnDef="doctor">
          <mat-header-cell *matHeaderCellDef>Doctor</mat-header-cell>
          <mat-cell *matCellDef="let row">{{ row.doctorName || '—' }}</mat-cell>
        </ng-container>

        <ng-container matColumnDef="slot">
          <mat-header-cell *matHeaderCellDef>Time Slot</mat-header-cell>
          <mat-cell *matCellDef="let row">{{ row.slotTime || '—' }}</mat-cell>
        </ng-container>

        <ng-container matColumnDef="status">
          <mat-header-cell *matHeaderCellDef>Status</mat-header-cell>
          <mat-cell *matCellDef="let row">
            <mat-chip [color]="getStatusColor(row.status)" selected>
              {{ row.status }}
            </mat-chip>
          </mat-cell>
        </ng-container>

        <ng-container matColumnDef="notes">
          <mat-header-cell *matHeaderCellDef>Notes</mat-header-cell>
          <mat-cell *matCellDef="let row">{{ row.notes || '—' }}</mat-cell>
        </ng-container>

        <ng-container matColumnDef="actions">
          <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
          <mat-cell *matCellDef="let row">
            <button
              mat-icon-button
              color="warn"
              *ngIf="canCancel(row.status)"
              (click)="cancelAppointment(row.id)"
              matTooltip="Cancel Appointment">
              <mat-icon>cancel</mat-icon>
            </button>
            <span *ngIf="!canCancel(row.status)" class="no-action">—</span>
          </mat-cell>
        </ng-container>

        <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
        <mat-row *matRowDef="let row; columns: displayedColumns"></mat-row>
      </mat-table>
    </mat-card-content>
  </mat-card>
</div>
