<!-- src/app/features/auth/login/login.component.html -->
<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>
        <mat-icon color="primary">local_hospital</mat-icon>
        Welcome Back
      </mat-card-title>
      <mat-card-subtitle>Sign in to HealthDesk</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" placeholder="you@example.com">
          <mat-icon matSuffix>email</mat-icon>
          <!-- Error messages — shown only after user touches field -->
          <mat-error *ngIf="emailControl?.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="emailControl?.hasError('email')">Enter a valid email</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password">
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="passwordControl?.hasError('required')">Password is required</mat-error>
          <mat-error *ngIf="passwordControl?.hasError('minlength')">Minimum 6 characters</mat-error>
        </mat-form-field>

        <!-- Inline error banner -->
        <div class="error-banner" *ngIf="errorMessage">
          <mat-icon>error_outline</mat-icon>
          {{ errorMessage }}
        </div>

        <button
          mat-raised-button
          color="primary"
          type="submit"
          class="full-width submit-btn"
          [disabled]="isLoading">
          <mat-spinner *ngIf="isLoading" diameter="20"></mat-spinner>
          <span *ngIf="!isLoading">Sign In</span>
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <p class="register-link">
        Don't have an account?
        <a routerLink="/auth/register" color="primary">Register here</a>
      </p>
    </mat-card-actions>
  </mat-card>
</div>
